<mat-toolbar class="top-toolbar">
  <button mat-icon-button (click)="onToggleSidebar()" class="menu-btn">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="spacer"></span>

  <!-- Action Icons -->
  <div class="actions-section">
    <button mat-icon-button class="notification-btn">
      <div class="notification-wrapper">
        <mat-icon>notifications_none</mat-icon>
        <span class="notification-dot"></span>
      </div>
    </button>

    <div class="vertical-divider"></div>

    <!-- User Profile -->
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-profile-btn">
      <div class="user-info">
        <div class="avatar-wrapper">
          <img [src]="navProfile?.profileImageUrl || 'https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'" alt="User Avatar" class="user-avatar">
        </div>
        <span class="user-name">{{ navProfile?.fullName || 'User' }}</span>
        <mat-icon class="dropdown-icon">expand_more</mat-icon>
      </div>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
